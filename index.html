<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Responsive Website</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
        }

        /* Header & Logo Styling */
        header {
            background-color: #ffffff;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .logo img {
            height: 60px; /* Logo ka size yahan se change karein */
            width: auto;
            object-fit: contain;
        }

        nav a {
            margin-left: 20px;
            text-decoration: none;
            color: #333;
            font-weight: 600;
        }

        /* Hero Section Styling */
        .hero {
            position: relative;
            width: 100%;
            height: 80vh;
            min-height: 500px;
            background-image: url('IMG_20260706_215224.png'); /* Hero Image */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Hero overlay for better text/product visibility */
        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Dark overlay */
            z-index: 1;
        }

        /* Product Content inside Hero */
        .hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
            color: #ffffff;
            padding: 20px;
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.6);
        }

        /* Product Image Styling */
        .product-display {
            margin-top: 20px;
        }

        .product-display img {
            max-width: 300px; /* Product image ka size */
            width: 100%;
            height: auto;
            border-radius: 10px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            transition: transform 0.3s ease;
        }

        .product-display img:hover {
            transform: scale(1.05); /* Hover karne par thoda bada hoga */
        }

        /* Footer */
        footer {
            background-color: #222;
            color: #fff;
            text-align: center;
            padding: 20px;
            margin-top: 50px;
        }

        /* Responsive Settings for Mobile */
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 2rem;
            }
            .product-display img {
                max-width: 200px;
            }
            .hero {
                height: 60vh;
            }
        }
    </style>
</head>
<body>

    <!-- Header Section with Logo -->
    <header>
        <div class="logo">
            <!-- Aapka Logo Card/Image -->
            <img src="IMG_20260706_213634.jpg" alt="Website Logo">
        </div>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section with Background and Product -->
    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Our Showcase</h1>
            <p>Check out our featured premium product below</p>
            
            <!-- Product Image Display -->
            <div class="product-display">
                <img src="IMG_20260723_193536.png" alt="Featured Product">
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer>
        <p>&copy; 2026 Your Brand Name. All rights reserved.</p>
    </footer>

</body>
</html>
